name: Discord Warrant Public Preview Report

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "指定圖卡日期，例如 2026-05-22。留空則自動抓 Google Sheet 內最新日期"
        required: false
        default: ""

  schedule:
    # 台灣時間週一～週五 17:45
    # UTC = 台灣時間 - 8 小時
    - cron: "45 09 * * 1-5"

jobs:
  send-public-preview-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GOOGLE_SHEET_NAME: "權證分點籌碼"
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}
      DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

      BUY_THRESHOLD: "1000000"
      SELL_THRESHOLD_RATIO: "0.2"
      LOOKBACK_TRADING_DAYS: "22"

      OUTPUT_IMAGE: "output/精選分點買賣超追蹤_公開預覽版.png"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests gspread google-auth matplotlib pillow

      - name: Prepare output folder
        run: |
          mkdir -p output

      - name: Run public preview report
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python public_preview_masked.py --date "$TARGET_DATE"
          else
            python public_preview_masked.py
          fi

      - name: Upload generated images as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warrant-public-preview-images
          path: output/*.png
