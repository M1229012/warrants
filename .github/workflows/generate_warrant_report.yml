name: 🧪 測試推播 (手動/更新觸發)

on:
  push:
    branches:
      - main
    paths:
      - 'notify_discord.py'  # 只有改程式碼才觸發測試
  workflow_dispatch:        # 讓你可以手動按按鈕測試

jobs:
  test-notification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gspread google-auth requests yfinance selenium webdriver_manager lxml matplotlib pandas numpy beautifulsoup4 google-genai googlenewsdecoder

    - name: Create Service Key
      env:
        GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}
      run: |
        python - <<'PY'
        import os

        key = os.getenv("GCP_SERVICE_KEY", "").strip()
        if not key:
            raise RuntimeError("GCP_SERVICE_KEY is empty")

        with open("service_key.json", "w", encoding="utf-8") as f:
            f.write(key)
        PY

    - name: Check Gemini API Key
      env:
        WARRANTS_API_KEY: ${{ secrets.WARRANTS_API_KEY }}
      run: |
        if [ -z "$WARRANTS_API_KEY" ]; then
          echo "❌ WARRANTS_API_KEY is empty"
          exit 1
        else
          echo "✅ WARRANTS_API_KEY is set"
        fi

    - name: Run Discord Notification (Test Mode)
      env:
        DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}
        GOOGLE_APPLICATION_CREDENTIALS: service_key.json
        WARRANTS_API_KEY: ${{ secrets.WARRANTS_API_KEY }}
        GEMINI_MODEL: gemini-2.5-flash
      run: |
        python notify_discord.py

    - name: Cleanup Service Key
      if: always()
      run: rm -f service_key.json
