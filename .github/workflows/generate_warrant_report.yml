name: Generate Warrant Image Report

on:
  workflow_dispatch:
    inputs:
      stock_codes:
        description: "股票代號，可用逗號分隔，例如 2408,2330"
        required: false
        default: "2408"
  schedule:
    # GitHub Actions cron 使用 UTC。
    # 台灣時間週一到週五 17:10 = UTC 09:10。
    - cron: "10 9 * * 1-5"

jobs:
  run-warrant-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OUTPUT_DIR: output
      STOCK_CODES: ${{ inputs.stock_codes || vars.STOCK_CODES || '2408' }}

      # Google Sheet 設定
      WARRANT_GSHEET_ENABLE: "1"
      GSHEET_NAME: "權證分點籌碼"
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      # 權證分點報告設定
      WARRANT_EVENT_MIN_AMOUNT: "0"
      WARRANT_EVENT_MARK_TOP_N_PER_DAY: "3"
      WARRANT_REPORT_MAX_ROWS: "8"

      # Discord 推播設定
      # 這裡會抓 GitHub Secrets 裡的 DISCORD_WEBHOOK_URL_TEST
      DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

      # 備用：如果未來你要改回正式頻道，也可以新增 DISCORD_WEBHOOK_URL
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run warrant report
        run: python run_report.py

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warrant-report-output
          path: output/*.png
          if-no-files-found: warn
