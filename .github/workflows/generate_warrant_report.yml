name: Warrant Report Manual Test - FinMind Only

on:
  workflow_dispatch:
    inputs:
      stock_codes:
        description: "股票代號，可用逗號分隔，例如 2408 或 2408,2330"
        required: false
        default: "2408"
      report_mode:
        description: "週報輸出模式"
        required: false
        type: choice
        options:
          - "完整週報"
          - "精簡週報（不含本週重點與本週新聞）"
        default: "完整週報"
      refresh_news_summary:
        description: "是否重新抓 FinMind 當日新聞並重新產生本週重點（0=使用同日摘要快取，1=強制重跑）"
        required: false
        type: choice
        options:
          - "0"
          - "1"
        default: "0"
      selected_branch_flow_mode:
        description: "精選分點資金流模式（five=預設五分點，custom=自訂分點）"
        required: false
        type: choice
        options:
          - "five"
          - "custom"
        default: "five"
      selected_branch_flow_branches:
        description: "自訂精選分點，多個用逗號分隔，例如 新光,第一金"
        required: false
        default: ""

jobs:
  run-warrant-report-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OUTPUT_DIR: output
      STOCK_CODES: ${{ inputs.stock_codes || '2408' }}
      WARRANT_REPORT_MODE: ${{ inputs.report_mode || '完整週報' }}
      PYTHONUNBUFFERED: "1"

      # matplotlib 在 GitHub runner 無視窗環境產圖
      MPLBACKEND: Agg

      # ========================================================
      # 唯一市場／新聞資料來源：FinMind
      # GitHub Secret 名稱是 FINMIND_API_0714，程式內統一讀 FINMIND_API_TOKEN。
      # ========================================================
      WARRANT_DATA_SOURCE_MODE: "finmind_only"
      FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_0714 }}
      FINMIND_REQUEST_RETRIES: "5"
      FINMIND_RETRY_BASE_WAIT: "1.5"
      FINMIND_CONNECT_TIMEOUT: "10"
      FINMIND_READ_TIMEOUT: "240"
      FINMIND_WARRANT_DOWNLOAD_WORKERS: "4"
      FINMIND_NEWS_WORKERS: "4"
      FINMIND_NEWS_LOOKBACK_DAYS: "30"
      FINMIND_WARRANT_LATEST_PROBE_DAYS: "7"
      FINMIND_STRICT_WARRANT_COMPLETENESS: "1"
      FINMIND_CACHE_DIR: finmind_cache

      # 上方權證資金流與 TOP5：逐檔排除該權證官方辨識的發行造市端。
      # TOP5 再沿用原本「排除明確總公司／自營型分點」規則；精選分點使用完整原始資料。
      WARRANT_FLOW_EXCLUDE_HEAD_OFFICE_BRANCH_ENABLE: "1"
      FINMIND_ISSUER_FLOW_ENABLE: "1"
      FINMIND_OFFICIAL_ISSUER_ENABLE: "1"
      FINMIND_OFFICIAL_ISSUER_DEBUG_ENABLE: "1"
      FINMIND_ISSUER_FLOW_DEBUG_ENABLE: "0"
      WARRANT_TOP5_EXCLUDE_HEAD_OFFICE_BRANCH_ENABLE: "1"

      # 正常命中只印摘要；欄位不足、發行商或分點無法辨識時仍輸出完整欄位供除錯。
      FINMIND_DEBUG_SCHEMA_ENABLE: "1"
      FINMIND_DEBUG_SELECTED_BRANCH_ENABLE: "1"
      FINMIND_DEBUG_VERBOSE_SUCCESS_ENABLE: "0"

      # ========================================================
      # Google Sheet 只作結果快照、Gemini 快取與既有勝率統計。
      # 不再作為股票名稱、權證母體或分點市場資料備援。
      # ========================================================
      WARRANT_GSHEET_ENABLE: "1"
      GSHEET_NAME: "權證分點籌碼"
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      WARRANT_GSHEET_CACHE_ENABLE: "1"
      WARRANT_GSHEET_HISTORY_SHEET: "快取_分點歷史"
      WARRANT_GSHEET_STATUS_SHEET: "快取_分點歷史_狀態"
      WARRANT_CACHE_USE_SEPARATE_SHEET: "1"
      WARRANT_CACHE_GOOGLE_SHEET_NAME: "權證週報完整快取"
      WARRANT_CACHE_PER_SNAPSHOT_SHEET_ENABLE: "1"
      WARRANT_CACHE_LEGACY_MAIN_FALLBACK_ENABLE: "0"

      # 權證分點每次都由 FinMind sponsorpro live 重抓。
      # 關閉「新聞刷新值同時控制權證快取」的舊邏輯，避免 refresh_news_summary=0 時誤讀舊 MoneyDJ 快照。
      WARRANT_ACTION_REFRESH_CONTROLS_REPORT_DATA: "0"
      WARRANT_REPORT_LIVE_ONLY: "1"
      WARRANT_LIVE_FETCH_ENABLE: "1"
      WARRANT_ALWAYS_REFRESH_WARRANT_FLOW: "1"
      WARRANT_CACHE_FORCE_REFRESH: "1"
      WARRANT_LOCAL_CACHE_ENABLE: "0"

      # ========================================================
      # Gemini：只負責整理 FinMind 新聞與週報結論，不是市場資料來源。
      # ========================================================
      WARRANT_GEMINI_ENABLE: "1"
      WARRANT_WEEKLY_KEYPOINT_LLM_ENABLE: "1"
      WARRANT_LLM_CACHE_ENABLE: ${{ inputs.refresh_news_summary == '1' && '0' || '1' }}
      WARRANT_LLM_CACHE_DIR: llm_cache
      WARRANT_GSHEET_LLM_CACHE_ENABLE: "1"
      WARRANT_GSHEET_LLM_CACHE_SHEET: "快取_Gemini結果"
      WARRANT_LLM_CACHE_FORCE_REFRESH: ${{ inputs.refresh_news_summary }}

      WARRANTS_API_KEY: ${{ secrets.WARRANTS_API_KEY }}
      WARRANTS_API_KEY_2: ${{ secrets.WARRANTS_API_KEY_2 }}
      WARRANTS_API_KEY_3: ${{ secrets.WARRANTS_API_KEY_3 }}
      GEMINI_MODEL: gemini-3.1-flash-lite

      # ========================================================
      # 新聞只使用 FinMind TaiwanStockNews。
      # 舊的 Google／Yahoo／Bing／MoneyDJ／MOPS 與外部原文補抓全部關閉。
      # ========================================================
      WARRANT_NEWS_ENABLE: "1"
      WARRANT_NEWS_SUMMARY_STYLE_VERSION: "v16_finmind_only"
      WARRANT_NEWS_ALLOW_OLD_STYLE_CACHE_FALLBACK: "0"
      WARRANT_NEWS_GOOGLE_MAX_ITEMS: "24"
      WARRANT_NEWS_MAX_ARTICLES_TO_GEMINI: "12"
      WARRANT_NEWS_MULTI_SOURCE_RETURN_LIMIT: "24"
      WARRANT_NEWS_MIN_DISTINCT_ARTICLES: "2"
      WARRANT_NEWS_FAST_MODE: "1"
      WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_ENABLE: "0"
      WARRANT_NEWS_MULTI_SOURCE_ENABLE: "0"
      WARRANT_NEWS_YAHOO_RSS_ENABLE: "0"
      WARRANT_NEWS_BING_RSS_ENABLE: "0"
      WARRANT_NEWS_MONEYDJ_SEARCH_ENABLE: "0"
      WARRANT_NEWS_MOPS_ENABLE: "0"
      WARRANT_NEWS_GNEWSDECODER_ENABLE: "0"

      # 權證分點報告設定
      WARRANT_EVENT_MIN_AMOUNT: "0"
      WARRANT_EVENT_MARK_TOP_N_PER_DAY: "3"
      WARRANT_REPORT_MAX_ROWS: "8"

      # 精選分點資金流設定
      WARRANT_SELECTED_BRANCH_FLOW_ENABLE: "1"
      WARRANT_SELECTED_BRANCH_FLOW_MODE: ${{ inputs.selected_branch_flow_mode || 'five' }}
      WARRANT_SELECTED_BRANCH_FLOW_BRANCHES: ${{ inputs.selected_branch_flow_branches || '五分點' }}

      # 可選：推送 Discord 測試頻道
      DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore LLM cache
        uses: actions/cache@v4
        with:
          path: llm_cache
          key: warrant-report-finmind-llm-${{ runner.os }}-${{ inputs.stock_codes }}-${{ github.run_id }}
          restore-keys: |
            warrant-report-finmind-llm-${{ runner.os }}-${{ inputs.stock_codes }}-
            warrant-report-finmind-llm-${{ runner.os }}-

      - name: Prepare folders
        run: |
          mkdir -p output llm_cache finmind_cache/warrant_daily

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: false

      - name: Install runtime dependencies and fonts
        shell: bash
        run: |
          set -euo pipefail

          # Python 套件與系統字型平行安裝，避免先後等待。
          uv pip install --system requests pandas gspread google-auth Pillow matplotlib numpy google-genai pyarrow beautifulsoup4 &
          UV_PID=$!

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

          wait "$UV_PID"

      - name: Validate Python syntax
        run: |
          python -m py_compile run_report.py

      - name: Check FinMind token and basic API
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.getenv("FINMIND_API_TOKEN", "").strip()
          if token.lower().startswith("bearer "):
              token = token[7:].strip()
          if not token:
              raise RuntimeError(
                  "FINMIND_API_TOKEN 為空，請確認 Repository Secret FINMIND_API_0714"
              )

          response = requests.get(
              "https://api.finmindtrade.com/api/v4/data",
              headers={"Authorization": f"Bearer {token}"},
              params={"dataset": "TaiwanStockInfo"},
              timeout=(10, 60),
          )
          print("FinMind HTTP status =", response.status_code)
          response.raise_for_status()
          payload = response.json()
          if str(payload.get("status", 200)) != "200":
              raise RuntimeError(f"FinMind API 驗證失敗：{payload}")
          print("✅ FinMind Token 可用｜TaiwanStockInfo rows =", len(payload.get("data", [])))
          PY

      - name: Check runtime settings
        run: |
          python - <<'PY'
          import os

          keys = [
              "WARRANT_DATA_SOURCE_MODE",
              "WARRANT_REPORT_MODE",
              "WARRANT_REPORT_LIVE_ONLY",
              "FINMIND_WARRANT_DOWNLOAD_WORKERS",
              "FINMIND_NEWS_LOOKBACK_DAYS",
              "FINMIND_OFFICIAL_ISSUER_ENABLE",
              "WARRANT_TOP5_EXCLUDE_HEAD_OFFICE_BRANCH_ENABLE",
              "FINMIND_DEBUG_VERBOSE_SUCCESS_ENABLE",
              "WARRANT_NEWS_SUMMARY_STYLE_VERSION",
              "WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_ENABLE",
              "WARRANT_CACHE_FORCE_REFRESH",
              "WARRANT_SELECTED_BRANCH_FLOW_MODE",
              "WARRANT_SELECTED_BRANCH_FLOW_BRANCHES",
          ]
          for key in keys:
              print(f"{key} = {os.getenv(key)}")
          print("FINMIND_API_TOKEN =", "SET" if os.getenv("FINMIND_API_TOKEN") else "EMPTY")
          print("WARRANTS_API_KEY =", "SET" if os.getenv("WARRANTS_API_KEY") else "EMPTY")
          print("WARRANTS_API_KEY_2 =", "SET" if os.getenv("WARRANTS_API_KEY_2") else "EMPTY")
          print("WARRANTS_API_KEY_3 =", "SET" if os.getenv("WARRANTS_API_KEY_3") else "EMPTY")
          PY

      - name: Run warrant report test
        run: |
          echo "========== 開始執行 FinMind-only run_report.py =========="
          echo "STOCK_CODES=$STOCK_CODES"
          echo "WARRANT_REPORT_MODE=$WARRANT_REPORT_MODE"
          echo "WARRANT_LLM_CACHE_FORCE_REFRESH=$WARRANT_LLM_CACHE_FORCE_REFRESH"
          echo "FINMIND_WARRANT_DOWNLOAD_WORKERS=$FINMIND_WARRANT_DOWNLOAD_WORKERS"
          echo "FINMIND_NEWS_LOOKBACK_DAYS=$FINMIND_NEWS_LOOKBACK_DAYS"
          echo "WARRANT_SELECTED_BRANCH_FLOW_MODE=$WARRANT_SELECTED_BRANCH_FLOW_MODE"
          echo "WARRANT_SELECTED_BRANCH_FLOW_BRANCHES=$WARRANT_SELECTED_BRANCH_FLOW_BRANCHES"
          python -u run_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warrant-report-finmind-test-output
          path: output/*.png
          if-no-files-found: warn
