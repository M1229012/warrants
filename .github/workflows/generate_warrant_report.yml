name: Warrant Report Manual Test

on:
  workflow_dispatch:
    inputs:
      stock_codes:
        description: "股票代號，可用逗號分隔，例如 2408 或 2408,2330"
        required: false
        default: "2408"

jobs:
  run-warrant-report-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OUTPUT_DIR: output
      STOCK_CODES: ${{ inputs.stock_codes || '2408' }}

      # 讓 matplotlib 在 GitHub runner 無視窗環境也能產圖
      MPLBACKEND: Agg

      # Google Sheet 設定
      WARRANT_GSHEET_ENABLE: "1"
      GSHEET_NAME: "權證分點籌碼"
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      # FinMind 設定：三大法人資料來源
      FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}

      # 權證分點報告設定
      WARRANT_EVENT_MIN_AMOUNT: "0"
      WARRANT_EVENT_MARK_TOP_N_PER_DAY: "3"
      WARRANT_REPORT_MAX_ROWS: "8"

      # 可選：若你想順便推到 Discord 測試頻道，就設定這個 Secret
      DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests matplotlib numpy yfinance gspread oauth2client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Check FinMind token
        run: |
          python -c "import os; print('FINMIND_API_TOKEN =', 'SET' if os.getenv('FINMIND_API_TOKEN') else 'EMPTY')"

      - name: Run warrant report test
        run: python run_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warrant-report-test-output
          path: output/*.png
          if-no-files-found: warn
