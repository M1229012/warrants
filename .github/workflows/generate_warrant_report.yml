name: Warrant Report Manual Test - FinMind Only

on:
  workflow_dispatch:
    inputs:
      stock_codes:
        description: "股票代號，可用逗號分隔，例如 2408 或 2408,2330"
        required: false
        default: "2408"
      report_mode:
        description: "週報輸出模式"
        required: false
        type: choice
        options:
          - "完整週報"
          - "精簡週報（不含本週重點與本週新聞）"
        default: "完整週報"
      refresh_news_summary:
        description: "是否重新抓 FinMind 當日新聞並重新產生本週重點（0=使用同日摘要快取，1=強制重跑）"
        required: false
        type: choice
        options:
          - "0"
          - "1"
        default: "0"
      selected_branch_flow_mode:
        description: "精選分點資金流模式（five=預設五分點，custom=自訂分點）"
        required: false
        type: choice
        options:
          - "five"
          - "custom"
        default: "five"
      selected_branch_flow_branches:
        description: "自訂精選分點，多個用逗號分隔，例如 新光,第一金"
        required: false
        default: ""
      prewarm_cache_only:
        description: "只預熱全市場共用快取，不產圖（平常請維持 0）"
        required: false
        type: choice
        options:
          - "0"
          - "1"
        default: "0"
      moneydj_compare_debug:
        description: "FinMind 與舊 MoneyDJ 完整對帳（成交量、上方權證資金流、TOP5、精選五分點；會額外耗時）"
        required: false
        type: choice
        options:
          - "0"
          - "1"
        default: "0"
      moneydj_compare_all_branches:
        description: "對帳時是否重現舊 MoneyDJ API4 全分點上方圖（1=是；建議本次比對選 1）"
        required: false
        type: choice
        options:
          - "0"
          - "1"
        default: "0"
      finmind_current_day_guard:
        description: "FinMind 當日資料是否啟用官方成交量完整性驗證（1=通過才納入，0=不驗證直接納入）"
        required: false
        type: choice
        options:
          - "0"
          - "1"
        default: "0"

  # Asia/Taipei 21:20 = UTC 13:20。
  # 每個交易日晚間先建立全市場精簡權證事件快取，之後手動查任何新股票都直接走快速路徑。
  schedule:
    - cron: "20 13 * * 1-5"

jobs:
  prewarm-finmind-market-cache:
    if: github.event_name == 'schedule' || inputs.prewarm_cache_only == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONUNBUFFERED: "1"
      MPLBACKEND: Agg
      OUTPUT_DIR: output
      WARRANT_PREWARM_ONLY: "1"
      WARRANT_DATA_SOURCE_MODE: "finmind_only"
      FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_0714 }}
      FINMIND_REQUEST_RETRIES: "5"
      FINMIND_RETRY_BASE_WAIT: "1.5"
      FINMIND_CONNECT_TIMEOUT: "10"
      FINMIND_READ_TIMEOUT: "240"
      FINMIND_CACHE_DIR: finmind_cache
      FINMIND_WARRANT_DOWNLOAD_WORKERS: "8"
      FINMIND_PREWARM_WORKERS: "4"
      FINMIND_PREWARM_CALENDAR_DAYS: "150"
      FINMIND_PREWARM_REFRESH_RECENT_DAYS: "2"
      FINMIND_PREWARM_KEEP_RAW_DAYS: "7"
      FINMIND_MARKET_COMPACT_CACHE_ENABLE: "1"
      FINMIND_MARKET_COMPACT_CACHE_VERSION: "v1"
      FINMIND_STRICT_WARRANT_COMPLETENESS: "1"
      FINMIND_WARRANT_LATEST_PROBE_DAYS: "7"
      FINMIND_OFFICIAL_ISSUER_ENABLE: "1"
      FINMIND_OFFICIAL_ISSUER_DEBUG_ENABLE: "0"
      FINMIND_DEBUG_SCHEMA_ENABLE: "0"
      FINMIND_DEBUG_SELECTED_BRANCH_ENABLE: "0"
      FINMIND_DEBUG_VERBOSE_SUCCESS_ENABLE: "0"
      # 預熱時順便把勝率統計保存到 finmind_cache/reference，正式產圖不再等待 Google Sheet。
      WARRANT_GSHEET_ENABLE: "1"
      GSHEET_NAME: "權證分點籌碼"
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}
      WARRANT_STOCK_NAME_GSHEET_ENABLE: "0"
      WARRANT_BRANCH_PERF_ENABLE: "1"
      WARRANT_BRANCH_PERF_DISK_CACHE_ENABLE: "1"
      WARRANT_GSHEET_CACHE_ENABLE: "0"
      WARRANT_GSHEET_LLM_CACHE_ENABLE: "0"
      WARRANT_GSHEET_LLM_CACHE_READ_ENABLE: "0"
      WARRANT_GSHEET_LLM_CACHE_WRITE_ENABLE: "0"
      WARRANT_GEMINI_ENABLE: "0"
      WARRANT_WEEKLY_KEYPOINT_LLM_ENABLE: "0"
      WARRANT_NEWS_ENABLE: "0"
      WARRANT_SELECTED_BRANCH_FLOW_ENABLE: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build cache date
        id: cache-date
        shell: bash
        run: |
          echo "date=$(TZ=Asia/Taipei date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore latest FinMind market cache
        uses: actions/cache/restore@v4
        with:
          path: finmind_cache
          key: warrant-finmind-market-${{ runner.os }}-${{ steps.cache-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            warrant-finmind-market-${{ runner.os }}-

      - name: Prepare folders
        run: |
          mkdir -p output finmind_cache/warrant_daily finmind_cache/reference

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-suffix: warrant-report-deps

      - name: Install prewarm dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv pip install --system requests pandas gspread google-auth Pillow matplotlib numpy pyarrow beautifulsoup4

      - name: Validate Python syntax
        run: |
          python -m py_compile K_function_warrant_report_20260530.py

      - name: Prewarm FinMind all-market cache
        run: |
          echo "========== 開始預熱 FinMind 全市場共用快取 =========="
          python -u K_function_warrant_report_20260530.py

      - name: Save refreshed FinMind market cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: finmind_cache
          key: warrant-finmind-market-${{ runner.os }}-${{ steps.cache-date.outputs.date }}-${{ github.run_id }}

  run-warrant-report-test:
    if: github.event_name == 'workflow_dispatch' && inputs.prewarm_cache_only != '1'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OUTPUT_DIR: output
      STOCK_CODES: ${{ inputs.stock_codes || '2408' }}
      WARRANT_REPORT_MODE: ${{ inputs.report_mode || '完整週報' }}
      PYTHONUNBUFFERED: "1"

      # matplotlib 在 GitHub runner 無視窗環境產圖
      MPLBACKEND: Agg
      WARRANT_REPORT_FONT_DIR: .cache/report-fonts

      # ========================================================
      # 市場資料使用 FinMind；新聞使用六來源整合
      # ========================================================
      WARRANT_DATA_SOURCE_MODE: "finmind_only"
      FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_0714 }}
      FINMIND_REQUEST_RETRIES: "5"
      FINMIND_RETRY_BASE_WAIT: "1.5"
      FINMIND_CONNECT_TIMEOUT: "10"
      FINMIND_READ_TIMEOUT: "240"
      FINMIND_WARRANT_DOWNLOAD_WORKERS: "8"
      # 歷史日期用 Parquet；最新交易日固定逐支有效權證呼叫 API，取得該權證所有分點。
      FINMIND_WARRANT_LATEST_DAY_API_ENABLE: "1"
      FINMIND_WARRANT_LATEST_DAY_API_WORKERS: "8"
      FINMIND_WARRANT_LATEST_DAY_API_STRICT: "1"
      FINMIND_NEWS_WORKERS: "8"
      FINMIND_NEWS_LOOKBACK_DAYS: "30"
      FINMIND_WARRANT_LATEST_PROBE_DAYS: "7"
      FINMIND_STRICT_WARRANT_COMPLETENESS: "1"
      FINMIND_CACHE_DIR: finmind_cache

      # 任意新股票直接使用排程預熱的全市場精簡事件檔。
      FINMIND_MARKET_COMPACT_CACHE_ENABLE: "1"
      FINMIND_MARKET_COMPACT_CACHE_VERSION: "v1"
      # FinMind 當日權證分點用 TWSE / TPEx 官方權證成交量逐檔驗證；通過才納入正式圖。
      FINMIND_WARRANT_CURRENT_DAY_GUARD_ENABLE: ${{ inputs.finmind_current_day_guard || '1' }}
      FINMIND_WARRANT_CURRENT_DAY_OPENAPI_VERIFY_ENABLE: "1"
      FINMIND_WARRANT_CURRENT_DAY_MIN_CODE_COVERAGE: "1.0"
      FINMIND_WARRANT_CURRENT_DAY_VOLUME_TOLERANCE_LOTS: "1.0"
      FINMIND_WARRANT_CURRENT_DAY_VOLUME_TOLERANCE_PCT: "0.001"

      # 上方權證資金流與 TOP5：逐檔排除該權證官方辨識的發行造市端。
      WARRANT_FLOW_EXCLUDE_HEAD_OFFICE_BRANCH_ENABLE: "1"
      FINMIND_ISSUER_FLOW_ENABLE: "1"
      FINMIND_ISSUER_FLOW_EXCLUDE_UNRESOLVED_ENABLE: "1"
      FINMIND_OFFICIAL_ISSUER_ENABLE: "1"
      FINMIND_OFFICIAL_ISSUER_DEBUG_ENABLE: "0"
      FINMIND_ISSUER_FLOW_DEBUG_ENABLE: ${{ inputs.moneydj_compare_debug == '1' && inputs.moneydj_compare_all_branches == '1' && '1' || '0' }}
      WARRANT_TOP5_EXCLUDE_HEAD_OFFICE_BRANCH_ENABLE: "1"

      # 正式產圖關閉大型成功 Debug；錯誤仍保留摘要與 traceback。
      FINMIND_DEBUG_SCHEMA_ENABLE: "0"
      FINMIND_DEBUG_SELECTED_BRANCH_ENABLE: "0"
      FINMIND_DEBUG_VERBOSE_SUCCESS_ENABLE: "0"

      # ========================================================
      # Google Sheet 只作 Gemini 快取與既有勝率統計。
      # ========================================================
      WARRANT_GSHEET_ENABLE: "1"
      GSHEET_NAME: "權證分點籌碼"
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}
      WARRANT_STOCK_NAME_GSHEET_ENABLE: "0"
      WARRANT_BRANCH_PERF_ENABLE: "1"
      WARRANT_BRANCH_PERF_DISK_CACHE_ENABLE: "1"

      WARRANT_GSHEET_CACHE_ENABLE: "1"
      WARRANT_GSHEET_HISTORY_SHEET: "快取_分點歷史"
      WARRANT_GSHEET_STATUS_SHEET: "快取_分點歷史_狀態"
      WARRANT_CACHE_USE_SEPARATE_SHEET: "1"
      WARRANT_CACHE_GOOGLE_SHEET_NAME: "權證週報完整快取"
      WARRANT_CACHE_PER_SNAPSHOT_SHEET_ENABLE: "1"
      WARRANT_CACHE_LEGACY_MAIN_FALLBACK_ENABLE: "0"

      WARRANT_ACTION_REFRESH_CONTROLS_REPORT_DATA: "0"
      WARRANT_REPORT_LIVE_ONLY: "1"
      WARRANT_LIVE_FETCH_ENABLE: "1"
      WARRANT_ALWAYS_REFRESH_WARRANT_FLOW: "0"
      WARRANT_CACHE_FORCE_REFRESH: "0"
      WARRANT_LOCAL_CACHE_ENABLE: "0"

      # ========================================================
      # Gemini：所有通過公司主體驗證的新聞素材都使用原始高品質規則。
      # 第一輪不足時允許 evidence／數字接地修復與不同事件補點；寧缺勿濫，不強迫湊滿。
      # 本週重點仍使用既有條件式資料分析。
      # ========================================================
      WARRANT_GEMINI_ENABLE: "1"
      WARRANT_WEEKLY_KEYPOINT_LLM_ENABLE: "0"
      WARRANT_WEEKLY_GEMINI_REPAIR_ENABLE: "0"
      WARRANT_LLM_CACHE_ENABLE: "1"
      WARRANT_LLM_CACHE_DIR: llm_cache
      WARRANT_LLM_DAILY_TASK_CACHE_ENABLE: "1"
      # 正式產圖完全移除 Google Sheet Gemini 快取的同步讀寫等待；跨 run 改由 Actions cache 保存 llm_cache。
      WARRANT_GSHEET_LLM_CACHE_ENABLE: "0"
      WARRANT_GSHEET_LLM_CACHE_READ_ENABLE: "0"
      WARRANT_GSHEET_LLM_CACHE_WRITE_ENABLE: "0"
      WARRANT_GSHEET_LLM_CACHE_SHEET: "快取_Gemini結果"
      WARRANT_LLM_CACHE_FORCE_REFRESH: ${{ inputs.refresh_news_summary }}

      WARRANTS_API_KEY: ${{ secrets.WARRANTS_API_KEY }}
      WARRANTS_API_KEY_2: ${{ secrets.WARRANTS_API_KEY_2 }}
      WARRANTS_API_KEY_3: ${{ secrets.WARRANTS_API_KEY_3 }}
      GEMINI_MODEL: gemini-3.1-flash-lite

      # ========================================================
      # 新聞恢復舊版多來源高品質管線：
      # Google News + FinMind + Yahoo RSS + Bing RSS + MoneyDJ + MOPS，
      # 先事件去重與相關性排序，再替 Top-K 補抓原文並交由 Gemini 驗證。
      # ========================================================
      WARRANT_NEWS_ENABLE: "1"
      # FinMind TaiwanStockNews 作為第六個來源；只有標題時僅作低優先級事實素材。
      WARRANT_FINMIND_NEWS_ENABLE: "1"
      WARRANT_FINMIND_NEWS_REQUIRE_DIRECT_TARGET: "1"
      WARRANT_NEWS_SUMMARY_STYLE_VERSION: "v21_multisource_finmind_grounded"
      WARRANT_NEWS_ALLOW_OLD_STYLE_CACHE_FALLBACK: "0"
      WARRANT_NEWS_GOOGLE_MAX_ITEMS: "36"
      WARRANT_NEWS_GOOGLE_SCAN_MULTIPLIER: "10"
      WARRANT_NEWS_GOOGLE_MIN_USABLE_ARTICLES: "2"
      WARRANT_NEWS_FALLBACK_DAYS: "7,14,30"
      WARRANT_NEWS_MAX_ARTICLES_TO_GEMINI: "12"
      WARRANT_NEWS_MULTI_SOURCE_RETURN_LIMIT: "24"
      WARRANT_NEWS_MIN_DISTINCT_ARTICLES: "2"

      # 先以 RSS 快速建候選，再只替最相關的前 3 篇補抓原文。
      WARRANT_NEWS_FAST_MODE: "1"
      WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_ENABLE: "1"
      WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_TOPK: "3"
      WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_WORKERS: "3"
      WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_REQUEST_TIMEOUT: "4"
      WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_BATCH_TIMEOUT: "8"
      WARRANT_NEWS_FAST_HYBRID_BODY_FETCH_MAX_BYTES: "196608"
      WARRANT_NEWS_MIN_BODY_CHARS: "120"
      WARRANT_NEWS_RSS_FALLBACK: "1"
      WARRANT_NEWS_REQUIRE_BODY: "0"

      # 多來源全部啟用；單一來源失敗時只略過該來源。
      WARRANT_NEWS_MULTI_SOURCE_ENABLE: "1"
      WARRANT_NEWS_YAHOO_RSS_ENABLE: "1"
      WARRANT_NEWS_BING_RSS_ENABLE: "1"
      WARRANT_NEWS_MONEYDJ_SEARCH_ENABLE: "1"
      WARRANT_NEWS_MOPS_ENABLE: "1"
      WARRANT_NEWS_EXTERNAL_MAX_ITEMS_PER_SOURCE: "12"
      WARRANT_NEWS_MONEYDJ_BODY_FETCH_LIMIT: "5"
      WARRANT_NEWS_MOPS_MAX_ITEMS: "12"
      WARRANT_NEWS_GNEWSDECODER_ENABLE: "0"

      # 第一輪輸出若 evidence、數字或格式不合格，允許修復；
      # 合格事件不足時只補不同事件，不用重複新聞湊滿。
      WARRANT_NEWS_GEMINI_REPAIR_ENABLE: "1"
      WARRANT_NEWS_GEMINI_SUPPLEMENT_ENABLE: "1"

      # 權證分點報告設定
      WARRANT_EVENT_MIN_AMOUNT: "0"
      WARRANT_EVENT_MARK_TOP_N_PER_DAY: "3"
      WARRANT_REPORT_MAX_ROWS: "8"

      # 28 吋畫布直接以接近最終 2400px 的 DPI 輸出，避免先產 3800px 再大幅縮圖。
      WARRANT_REPORT_OUTPUT_DPI: "84"
      WARRANT_REPORT_INTERMEDIATE_PNG_COMPRESS_LEVEL: "0"
      WARRANT_SCREENSHOT_OUTPUT_MAX_WIDTH: "2400"
      WARRANT_SCREENSHOT_OUTPUT_PNG_COMPRESS_LEVEL: "4"

      # 精選分點資金流設定
      WARRANT_SELECTED_BRANCH_FLOW_ENABLE: "1"
      WARRANT_SELECTED_BRANCH_FLOW_MODE: ${{ inputs.selected_branch_flow_mode || 'five' }}
      WARRANT_SELECTED_BRANCH_FLOW_BRANCHES: ${{ inputs.selected_branch_flow_branches || '五分點' }}

      # FinMind vs 舊 MoneyDJ 一次性完整對帳：只列印與輸出 CSV，不改正式報表計算。
      WARRANT_COMPARE_MONEYDJ_DEBUG_ENABLE: ${{ inputs.moneydj_compare_debug || '0' }}
      WARRANT_COMPARE_DEBUG_ALL_BRANCH_ENABLE: ${{ inputs.moneydj_compare_all_branches || '1' }}
      WARRANT_COMPARE_DEBUG_MAX_ROWS: "120"
      WARRANT_COMPARE_DEBUG_VOLUME_DAYS: "30"
      WARRANT_COMPARE_DEBUG_API4_WORKERS: "30"
      WARRANT_COMPARE_DEBUG_API5_WORKERS: "40"
      WARRANT_COMPARE_DEBUG_SAVE_CSV: "1"

      DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build cache date
        id: cache-date
        shell: bash
        run: |
          echo "date=$(TZ=Asia/Taipei date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore LLM cache
        uses: actions/cache/restore@v4
        with:
          path: llm_cache
          key: warrant-report-finmind-llm-${{ runner.os }}-${{ inputs.stock_codes }}-${{ steps.cache-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            warrant-report-finmind-llm-${{ runner.os }}-${{ inputs.stock_codes }}-${{ steps.cache-date.outputs.date }}-
            warrant-report-finmind-llm-${{ runner.os }}-${{ inputs.stock_codes }}-
            warrant-report-finmind-llm-${{ runner.os }}-

      # 報表工作只還原，不重新上傳大型全市場快取；每日排程專責更新與保存。
      - name: Restore latest FinMind market cache
        uses: actions/cache/restore@v4
        with:
          path: finmind_cache
          key: warrant-finmind-market-${{ runner.os }}-${{ steps.cache-date.outputs.date }}-manual-${{ github.run_id }}
          restore-keys: |
            warrant-finmind-market-${{ runner.os }}-

      - name: Restore report fonts cache
        uses: actions/cache@v4
        with:
          path: .cache/report-fonts
          key: report-fonts-noto-cjk-tc-v2

      - name: Prepare folders
        run: |
          mkdir -p output llm_cache finmind_cache/warrant_daily finmind_cache/reference .cache/report-fonts
          rm -f output/*_warrant_report.png output/debug_*.csv

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-suffix: warrant-report-deps

      - name: Install runtime dependencies and prepare fonts
        shell: bash
        run: |
          set -euo pipefail

          FONT_DIR=".cache/report-fonts"
          REGULAR_FONT="${FONT_DIR}/NotoSansCJKtc-Regular.otf"
          BOLD_FONT="${FONT_DIR}/NotoSansCJKtc-Bold.otf"
          mkdir -p "${FONT_DIR}"

          download_font() {
            local target="$1"
            local url="$2"
            if [ -s "$target" ]; then
              echo "✅ 字型已存在：$(basename "$target")"
              return 0
            fi
            echo "⬇️ 下載字型：$(basename "$target")"
            curl \
              --fail \
              --location \
              --retry 4 \
              --retry-delay 2 \
              --connect-timeout 10 \
              --max-time 120 \
              --output "$target" \
              "$url"
            test -s "$target"
          }

          download_font "$REGULAR_FONT" "https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" &
          FONT_PID_1=$!
          download_font "$BOLD_FONT" "https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Bold.otf" &
          FONT_PID_2=$!

          uv pip install --system requests pandas gspread google-auth Pillow matplotlib numpy google-genai pyarrow beautifulsoup4 lxml googlenewsdecoder

          wait "$FONT_PID_1"
          wait "$FONT_PID_2"
          echo "✅ 報表中文字型準備完成"

      - name: Validate Python syntax
        run: |
          python -m py_compile K_function_warrant_report_20260530.py

      - name: Run warrant report test
        run: |
          echo "========== 開始執行 FinMind market + multi-source news K_function_warrant_report_20260530.py =========="
          echo "STOCK_CODES=$STOCK_CODES"
          echo "WARRANT_REPORT_MODE=$WARRANT_REPORT_MODE"
          echo "WARRANT_LLM_CACHE_FORCE_REFRESH=$WARRANT_LLM_CACHE_FORCE_REFRESH"
          echo "FINMIND_WARRANT_DOWNLOAD_WORKERS=$FINMIND_WARRANT_DOWNLOAD_WORKERS"
          echo "FINMIND_WARRANT_LATEST_DAY_API_ENABLE=$FINMIND_WARRANT_LATEST_DAY_API_ENABLE"
          echo "FINMIND_WARRANT_LATEST_DAY_API_WORKERS=$FINMIND_WARRANT_LATEST_DAY_API_WORKERS"
          echo "FINMIND_WARRANT_LATEST_DAY_API_STRICT=$FINMIND_WARRANT_LATEST_DAY_API_STRICT"
          echo "FINMIND_NEWS_LOOKBACK_DAYS=$FINMIND_NEWS_LOOKBACK_DAYS"
          echo "WARRANT_FINMIND_NEWS_ENABLE=$WARRANT_FINMIND_NEWS_ENABLE"
          echo "WARRANT_SELECTED_BRANCH_FLOW_MODE=$WARRANT_SELECTED_BRANCH_FLOW_MODE"
          echo "WARRANT_SELECTED_BRANCH_FLOW_BRANCHES=$WARRANT_SELECTED_BRANCH_FLOW_BRANCHES"
          echo "WARRANT_COMPARE_MONEYDJ_DEBUG_ENABLE=$WARRANT_COMPARE_MONEYDJ_DEBUG_ENABLE"
          echo "WARRANT_COMPARE_DEBUG_ALL_BRANCH_ENABLE=$WARRANT_COMPARE_DEBUG_ALL_BRANCH_ENABLE"
          echo "FINMIND_WARRANT_CURRENT_DAY_GUARD_ENABLE=$FINMIND_WARRANT_CURRENT_DAY_GUARD_ENABLE"
          echo "FINMIND_WARRANT_CURRENT_DAY_OPENAPI_VERIFY_ENABLE=$FINMIND_WARRANT_CURRENT_DAY_OPENAPI_VERIFY_ENABLE"
          python -u K_function_warrant_report_20260530.py

      - name: Save refreshed LLM cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: llm_cache
          key: warrant-report-finmind-llm-${{ runner.os }}-${{ inputs.stock_codes }}-${{ steps.cache-date.outputs.date }}-${{ github.run_id }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warrant-report-finmind-test-output
          path: |
            output/*.png
            output/debug_*.csv
