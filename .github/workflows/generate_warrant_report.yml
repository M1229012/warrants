name: Generate Warrant Image Report

on:
  workflow_dispatch:
    inputs:
      stock_id:
        description: "股票代號，例如 2408"
        required: true
        default: "2408"
      sheet_name:
        description: "Google Sheet 名稱"
        required: true
        default: "權證分點籌碼"
      worksheet:
        description: "工作表名稱，空白代表讀取所有工作表"
        required: false
        default: ""

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}
      DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}
      GSHEET_NAME: ${{ github.event.inputs.sheet_name }}
      GSHEET_WORKSHEET: ${{ github.event.inputs.worksheet }}
      OUTPUT_DIR: output

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report image
        run: |
          python run_report.py \
            --stock-id "${{ github.event.inputs.stock_id }}" \
            --sheet-name "${{ github.event.inputs.sheet_name }}" \
            --worksheet "${{ github.event.inputs.worksheet }}" \
            --output-dir "output"

      - name: Send report image to Discord
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL_TEST" ]; then
            echo "DISCORD_WEBHOOK_URL_TEST is empty. Please set it in GitHub Secrets."
            exit 1
          fi

          REPORT_FILE="$(ls -t output/*.png | head -n 1)"

          if [ -z "$REPORT_FILE" ]; then
            echo "No PNG report found in output folder."
            exit 1
          fi

          echo "Sending report to Discord: $REPORT_FILE"

          curl --fail -sS \
            -F "payload_json={\"username\":\"股市艾斯週報機器人\",\"content\":\"📊 **${{ github.event.inputs.stock_id }} 個股大戶追蹤圖像週報**\n資料來源：${{ github.event.inputs.sheet_name }}\n圖片已自動生成如下。\"}" \
            -F "files[0]=@$REPORT_FILE" \
            "$DISCORD_WEBHOOK_URL_TEST"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: warrant-report-${{ github.event.inputs.stock_id }}
          path: output/*.png
          if-no-files-found: error
