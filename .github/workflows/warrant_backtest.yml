name: Warrant Backtest Google Sheet

on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: "執行方案"
        required: true
        default: "每日自動流程"
        type: choice
        options:
          - "每日自動流程"
          - "精選五分點新分類"
          - "長期留單補價格"
          - "完整修補模式"

  schedule:
    # Asia/Taipei 17:10
    - cron: "10 9 * * 1-5"

    # Asia/Taipei 21:05、21:35
    - cron: "5,35 13 * * 1-5"


permissions:
  contents: read
  actions: write


jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      # ============================================================
      # 路徑與 FinMind
      # ============================================================
      OUTPUT_DIR: output
      CACHE_DIR: warrant_cache

      FINMIND_API_0714: ${{ secrets.FINMIND_API_0714 }}
      FINMIND_API_BASE: "https://api.finmindtrade.com/api/v4"
      FINMIND_CACHE_SCHEMA_VERSION: "finmind-v2-date-aware"
      WARRANT_IDENTITY_RECONCILE_ENABLED: "1"
      WARRANT_IDENTITY_OVERRIDE_MIN_PREFIX: "3"
      WARRANT_IDENTITY_REPAIR_HISTORY: "1"
      GSHEET_REPAIR_SECURITY_IDENTITY_ROWS: "1"

      FINMIND_METADATA_CACHE_HOURS: "18"
      FINMIND_HISTORY_WORKERS: "10"
      FINMIND_MAX_RETRIES: "4"
      FINMIND_RETRY_BASE_SECONDS: "2"
      FINMIND_REQUEST_TIMEOUT_CONNECT: "8"
      FINMIND_REQUEST_TIMEOUT_READ: "120"

      # 目標日每次重新確認。
      # daily：最新日未發布就快速結束，避免空抓。
      # repair：往前找最近已發布交易日作為基準，只補歷史快取缺少／失敗日期。
      FINMIND_FORCE_REFRESH_TARGET_DATE: "1"
      FINMIND_INITIAL_BACKFILL_ON_EMPTY: "1"
      FINMIND_REPAIR_ALLOW_TARGET_FALLBACK: "1"
      FINMIND_REPAIR_TARGET_FALLBACK_TRADING_DAYS: "15"

      # 原始全市場日檔只保留最近少量日期；標準化歷史另存 Parquet。
      FINMIND_RAW_DAILY_RETENTION_DAYS: "7"
      CACHE_WRITE_CSV_COMPAT: "0"

      # ============================================================
      # 基本快取
      # ============================================================
      USE_CACHE: "1"
      FORCE_FULL_CACHE_REFRESH: "0"
      CACHE_AUTO_PRUNE_ENABLED: "1"
      HISTORY_RETENTION_TRADING_DAYS: "200"
      PRICE_RETENTION_TRADING_DAYS: "260"

      # ============================================================
      # 精選五分點
      # ============================================================
      SELECTED_TARGET_LABELS: "華南永昌台中,元大南屯,富邦敦南,永豐金內湖,新光"

      # ============================================================
      # 價格與報表規則
      # ============================================================
      FETCH_GROUP_WARRANT_PRICES: "0"
      PRICE_WORKERS: "60"

      TOP15_CACHE_ENABLED: "1"
      TOP15_LOOKBACK_TRADING_DAYS: "40"
      TOP15_PRICE_LOOKBACK_DAYS: "75"
      TOP15_TARGET_PRICE_REFETCH_DAYS: "12"
      TOP15_REQUIRE_TARGET_DATE_PRICE: "1"
      TOP15_EXCLUDE_MISSING_PRICE_FROM_RETURN: "1"
      TOP15_MIN_BROKER_REMAINING_COST: "100000"
      # 正式LP端點尚未確認，先停用，避免每輪大量無效請求。
      TOP15_LP_QUOTE_FALLBACK_ENABLED: "0"
      TOP15_LP_QUOTE_TIMEOUT_SECONDS: "15"
      TOP15_LP_QUOTE_WORKERS: "10"
      TOP15_LP_ALLOW_IMPLICIT_LATEST_DATE: "0"
      TOP15_LAST_TRADE_FALLBACK_ENABLED: "1"
      TOP15_LAST_TRADE_FALLBACK_MAX_DAYS: "75"
      TOP15_TRADED_PRICE_COVERAGE_NOTE_THRESHOLD_PCT: "60"
      TOP15_LP_QUOTE_URLS: "https://warrants.twse.com.tw/Query.aspx,https://warrants.twse.com.tw/query,https://warrants.sfi.org.tw/Query.aspx"

      SELL_DETAIL_DAYS: "3"
      # ============================================================
      # 完整修補延伸報表
      # 每日流程不計算這些表；完整修補模式會建立缺少的工作表。
      # ============================================================
      RECENT_RANKING_DAYS: "62"
      WARRANT_CONSENSUS_7D_ENABLED: "1"
      WARRANT_CONSENSUS_7D_DAYS: "7"
      WARRANT_CONSENSUS_14D_DAYS: "14"
      WARRANT_CONSENSUS_21D_DAYS: "21"
      WARRANT_CONSENSUS_7D_TOP_N: "15"
      BROKER_10D_DETAIL_ENABLED: "1"
      BROKER_10D_WINRATE_RANK_ENABLED: "1"
      BROKER_10D_DETAIL_DAYS: "10"

      # ============================================================
      # Google Sheet
      # 工作表不存在時才建立；已存在時只 insert 缺少資料。
      # 不刪除、不清空、不重建任何工作表；只刪除已失效分點的舊資料列。
      # ============================================================
      GOOGLE_SHEET_NAME: "權證分點資料_NEW"

      GSHEET_CACHE_ENABLED: "0"
      GSHEET_RESULT_ENABLED: "1"
      GSHEET_RESULT_UPSERT_ENABLED: "1"
      GSHEET_CLEAN_DELETED_BROKER_ROWS: "1"

      GSHEET_WRITE_SLEEP_SECONDS: "0.05"
      GSHEET_WRITE_RATE_PER_MINUTE: "45"
      GSHEET_WRITE_BURST: "5"
      GSHEET_MAX_RETRIES: "6"
      GSHEET_RETRY_BASE_SECONDS: "12"

      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY_NEW }}

      # ============================================================
      # Supabase
      # 本版只先上快取止血與診斷；Supabase讀回另開一版實作與驗收。
      # ============================================================
      SUPABASE_CACHE_ENABLED: "0"


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Ensure FinMind cache directory
        shell: bash
        run: mkdir -p warrant_cache

      # restore與save拆開，讓程式失敗時仍可透過if: always()保存failed_dates狀態。
      # 每次run使用唯一key保存最新快取，再由restore-keys抓同分支最新一份。
      - name: Restore FinMind local cache
        id: finmind-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: warrant_cache
          key: warrant-cache-finmind-v3-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            warrant-cache-finmind-v3-${{ runner.os }}-${{ github.ref_name }}-
            warrant-cache-finmind-v3-${{ runner.os }}-
            warrant-cache-finmind-v2-${{ runner.os }}-

      - name: Resolve run settings
        shell: bash
        run: |
          PLAN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan || '每日自動流程' }}"

          WORKFLOW_MODE="daily"
          RUN_MODE="2"
          INITIAL_HISTORY_DAYS="200"
          DAILY_UPDATE_DAYS="3"

          case "$PLAN" in
            "每日自動流程")
              ;;

            "精選五分點新分類")
              RUN_MODE="1"
              ;;

            "長期留單補價格")
              WORKFLOW_MODE="longterm"
              RUN_MODE="2"
              ;;

            "完整修補模式")
              WORKFLOW_MODE="repair"
              RUN_MODE="2"
              # 以200日作完整性窗口，但程式只補缺少日、失敗日與本次目標日。
              # 已存在的工作表只增量 insert 缺少資料，不會整表覆寫。
              INITIAL_HISTORY_DAYS="200"
              DAILY_UPDATE_DAYS="5"
              ;;

            *)
              echo "不支援的執行方案：$PLAN"
              exit 1
              ;;
          esac

          {
            echo "WORKFLOW_MODE=$WORKFLOW_MODE"
            echo "RUN_MODE=$RUN_MODE"
            echo "INITIAL_HISTORY_DAYS=$INITIAL_HISTORY_DAYS"
            echo "DAILY_UPDATE_DAYS=$DAILY_UPDATE_DAYS"
          } >> "$GITHUB_ENV"

          echo "=========================================="
          echo "執行方案：$PLAN"
          echo "WORKFLOW_MODE：$WORKFLOW_MODE"
          echo "RUN_MODE：$RUN_MODE"
          echo "INITIAL_HISTORY_DAYS：$INITIAL_HISTORY_DAYS"
          echo "DAILY_UPDATE_DAYS：$DAILY_UPDATE_DAYS"
          echo "=========================================="

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyarrow

      - name: Inspect restored FinMind cache
        shell: bash
        run: |
          echo "cache-hit=${{ steps.finmind-cache-restore.outputs.cache-hit }}"
          echo "cache-primary-key=${{ steps.finmind-cache-restore.outputs.cache-primary-key }}"
          du -sh warrant_cache 2>/dev/null || true
          find warrant_cache -maxdepth 2 -type f -printf '%p %s bytes\n' | sort | head -200 || true
          python - <<'PY'
          import json
          from pathlib import Path

          cache_dir = Path("warrant_cache")
          state_path = cache_dir / "finmind_update_state.json"
          history_path = cache_dir / "broker_warrant_history_cache.csv.parquet"
          price_path = cache_dir / "price_cache.csv.parquet"
          raw_dir = cache_dir / "finmind_warrant_daily"

          print(f"CACHE_DIAG state_exists={state_path.exists()}")
          if state_path.exists():
              try:
                  state = json.loads(state_path.read_text(encoding="utf-8"))
                  print(
                      "CACHE_DIAG "
                      f"schema={state.get('schema_version', '-')} "
                      f"completed_dates={len(state.get('completed_dates') or [])} "
                      f"failed_dates={len(state.get('failed_dates') or [])} "
                      f"updated_at={state.get('updated_at', '-')}"
                  )
              except Exception as exc:
                  print(f"CACHE_DIAG state_read_error={type(exc).__name__}: {exc}")

          try:
              import pyarrow.parquet as pq
              for label, path in (("history", history_path), ("price", price_path)):
                  if path.exists():
                      meta = pq.ParquetFile(path).metadata
                      print(f"CACHE_DIAG {label}_rows={meta.num_rows} size={path.stat().st_size}")
                  else:
                      print(f"CACHE_DIAG {label}_missing=1")
          except Exception as exc:
              print(f"CACHE_DIAG parquet_metadata_error={type(exc).__name__}: {exc}")

          raw_count = len(list(raw_dir.glob("*.parquet"))) if raw_dir.exists() else 0
          print(f"CACHE_DIAG raw_daily_files={raw_count}")
          PY

      - name: Run warrant backtest
        run: |
          mkdir -p output warrant_cache
          python warrant_backtest.py

      - name: Inspect FinMind cache before save
        if: always()
        shell: bash
        run: |
          echo "========== FinMind cache before save =========="
          du -sh warrant_cache 2>/dev/null || true
          python - <<'PY'
          import json
          from pathlib import Path

          state_path = Path("warrant_cache/finmind_update_state.json")
          print(f"CACHE_SAVE_DIAG state_exists={state_path.exists()}")
          if state_path.exists():
              try:
                  state = json.loads(state_path.read_text(encoding="utf-8"))
                  print(
                      "CACHE_SAVE_DIAG "
                      f"schema={state.get('schema_version', '-')} "
                      f"completed_dates={len(state.get('completed_dates') or [])} "
                      f"failed_dates={len(state.get('failed_dates') or [])} "
                      f"in_progress_dates={len(state.get('refresh_in_progress_dates') or [])} "
                      f"updated_at={state.get('updated_at', state.get('last_refresh_started_at', '-'))}"
                  )
              except Exception as exc:
                  print(f"CACHE_SAVE_DIAG state_read_error={type(exc).__name__}: {exc}")
          PY

      # 關鍵閉環：即使Run warrant backtest失敗，也要保存state與Parquet，
      # 讓下一輪能讀到failed_dates並只重試失敗日期。
      - name: Save FinMind local cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: warrant_cache
          key: warrant-cache-finmind-v3-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      # GitHub cache不可覆寫同一key，因此每輪使用唯一key；保存後只留同分支最新3份，
      # 避免大型warrant_cache長期累積而觸發10GB配額淘汰。
      - name: Prune old FinMind caches
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          CACHE_PREFIX: warrant-cache-finmind-v3-${{ runner.os }}-${{ github.ref_name }}-
        shell: bash
        run: |
          echo "保留同分支最新3份FinMind cache，刪除更舊項目。"
          mapfile -t OLD_CACHE_IDS < <(
            gh cache list \
              --repo "$GITHUB_REPOSITORY" \
              --key "$CACHE_PREFIX" \
              --ref "$GITHUB_REF" \
              --sort created_at \
              --order desc \
              --limit 100 \
              --json id \
              --jq '.[3:][] | .id'
          )

          if [ "${#OLD_CACHE_IDS[@]}" -eq 0 ]; then
            echo "沒有需要刪除的舊FinMind cache。"
            exit 0
          fi

          for cache_id in "${OLD_CACHE_IDS[@]}"; do
            echo "刪除舊FinMind cache id=$cache_id"
            gh cache delete "$cache_id" --repo "$GITHUB_REPOSITORY"
          done

      - name: Upload Excel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warrant-backtest-excel
          path: output/*.xlsx
          if-no-files-found: ignore
