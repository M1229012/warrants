name: Warrant Backtest Google Sheet

on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: "執行方案"
        required: true
        default: "每日自動流程"
        type: choice
        options:
          - "每日自動流程"
          - "精選五分點新分類"
          - "長期留單補價格"
          - "完整修補模式"

  schedule:
    # Asia/Taipei 17:10
    - cron: "10 9 * * 1-5"

    # Asia/Taipei 21:05、21:35
    - cron: "5,35 13 * * 1-5"


jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      # ============================================================
      # 路徑與 FinMind
      # ============================================================
      OUTPUT_DIR: output
      CACHE_DIR: warrant_cache

      FINMIND_API_0714: ${{ secrets.FINMIND_API_0714 }}
      FINMIND_API_BASE: "https://api.finmindtrade.com/api/v4"
      FINMIND_CACHE_SCHEMA_VERSION: "finmind-v2-date-aware"

      FINMIND_METADATA_CACHE_HOURS: "18"
      FINMIND_HISTORY_WORKERS: "6"
      FINMIND_MAX_RETRIES: "4"
      FINMIND_RETRY_BASE_SECONDS: "2"
      FINMIND_REQUEST_TIMEOUT_CONNECT: "8"
      FINMIND_REQUEST_TIMEOUT_READ: "120"

      # 目標日每次重新確認；若尚未發布，立即結束，不抓空資料。
      FINMIND_FORCE_REFRESH_TARGET_DATE: "1"
      FINMIND_INITIAL_BACKFILL_ON_EMPTY: "1"

      # 原始全市場日檔只保留最近少量日期；標準化歷史另存 Parquet。
      FINMIND_RAW_DAILY_RETENTION_DAYS: "7"
      CACHE_WRITE_CSV_COMPAT: "0"

      # ============================================================
      # 基本快取
      # ============================================================
      USE_CACHE: "1"
      FORCE_FULL_CACHE_REFRESH: "0"
      CACHE_AUTO_PRUNE_ENABLED: "1"
      HISTORY_RETENTION_TRADING_DAYS: "200"
      PRICE_RETENTION_TRADING_DAYS: "200"

      # ============================================================
      # 精選五分點
      # ============================================================
      SELECTED_TARGET_LABELS: "華南永昌台中,元大南屯,富邦敦南,永豐金內湖,新光"

      # ============================================================
      # 價格與報表規則
      # ============================================================
      FETCH_GROUP_WARRANT_PRICES: "0"
      PRICE_WORKERS: "60"

      TOP15_CACHE_ENABLED: "1"
      TOP15_LOOKBACK_TRADING_DAYS: "40"
      TOP15_PRICE_LOOKBACK_DAYS: "75"
      TOP15_REQUIRE_TARGET_DATE_PRICE: "1"
      TOP15_EXCLUDE_MISSING_PRICE_FROM_RETURN: "1"
      TOP15_MIN_BROKER_REMAINING_COST: "100000"

      SELL_DETAIL_DAYS: "3"
      # ============================================================
      # Google Sheet
      # 只同步最終 8 張結果表；原始歷史／價格／候選快取不再存入 Sheet。
      # ============================================================
      GOOGLE_SHEET_NAME: "權證分點資料_NEW"

      GSHEET_CACHE_ENABLED: "0"
      GSHEET_RESULT_ENABLED: "1"
      GSHEET_RESULT_UPSERT_ENABLED: "1"
      GSHEET_DELETE_OBSOLETE_MANAGED_SHEETS: "1"

      GSHEET_WRITE_SLEEP_SECONDS: "1.25"
      GSHEET_MAX_RETRIES: "6"
      GSHEET_RETRY_BASE_SECONDS: "12"

      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY_NEW }}

      # ============================================================
      # Supabase
      # ============================================================
      SUPABASE_CACHE_ENABLED: "0"


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore FinMind local cache
        uses: actions/cache@v4
        with:
          path: warrant_cache
          key: warrant-cache-finmind-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            warrant-cache-finmind-v2-${{ runner.os }}-

      - name: Resolve run settings
        shell: bash
        run: |
          PLAN="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan || '每日自動流程' }}"

          WORKFLOW_MODE="daily"
          RUN_MODE="2"
          INITIAL_HISTORY_DAYS="200"
          DAILY_UPDATE_DAYS="3"

          case "$PLAN" in
            "每日自動流程")
              ;;

            "精選五分點新分類")
              RUN_MODE="1"
              ;;

            "長期留單補價格")
              WORKFLOW_MODE="longterm"
              RUN_MODE="2"
              ;;

            "完整修補模式")
              WORKFLOW_MODE="repair"
              RUN_MODE="2"
              INITIAL_HISTORY_DAYS="200"
              DAILY_UPDATE_DAYS="5"
              ;;

            *)
              echo "不支援的執行方案：$PLAN"
              exit 1
              ;;
          esac

          {
            echo "WORKFLOW_MODE=$WORKFLOW_MODE"
            echo "RUN_MODE=$RUN_MODE"
            echo "INITIAL_HISTORY_DAYS=$INITIAL_HISTORY_DAYS"
            echo "DAILY_UPDATE_DAYS=$DAILY_UPDATE_DAYS"
          } >> "$GITHUB_ENV"

          echo "=========================================="
          echo "執行方案：$PLAN"
          echo "WORKFLOW_MODE：$WORKFLOW_MODE"
          echo "RUN_MODE：$RUN_MODE"
          echo "INITIAL_HISTORY_DAYS：$INITIAL_HISTORY_DAYS"
          echo "DAILY_UPDATE_DAYS：$DAILY_UPDATE_DAYS"
          echo "=========================================="

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyarrow

      - name: Run warrant backtest
        run: |
          mkdir -p output warrant_cache
          python warrant_backtest.py

      - name: Upload Excel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warrant-backtest-excel
          path: output/*.xlsx
          if-no-files-found: ignore
