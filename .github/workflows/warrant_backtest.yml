name: Warrant Backtest Google Sheet

on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: "執行方案"
        required: true
        default: "精選5分點當日買賣超產圖"
        type: choice
        options:
          - "精選5分點當日買賣超產圖"
          - "完整資料回補與回測"
          - "不使用快取重新抓完整資料"

  schedule:
    # Asia/Taipei 18:30 = UTC 10:30
    # 下午 6:30 跑：精選5分點當日買賣超產圖
    - cron: "40 07 * * 1-5"

    # Asia/Taipei 21:30 = UTC 13:30
    # 晚上 9:30 跑：完整資料回補與回測
    - cron: "30 10 * * 1-5"

concurrency:
  group: warrant-backtest-google-sheet
  cancel-in-progress: false

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      OUTPUT_DIR: output
      CACHE_DIR: warrant_cache

      # Supabase 快取設定
      # 這兩個只是把 Supabase 連線資訊傳進 GitHub Actions。
      # 之後主程式 warrant_backtest.py 還需要改成讀寫 Supabase，才會真正生效。
      SUPABASE_CACHE_ENABLED: "1"
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      # 只保留三種方案：
      # 1. 精選5分點當日買賣超產圖：只跑精選 5 分點，但資料一定抓完整，確保 TOP15 正確。
      # 2. 完整資料回補與回測：跑全資料，使用既有快取補更新。
      # 3. 不使用快取重新抓完整資料：跑全資料，不讀舊快取，重新建立快取。
      #
      # 觸發規則：
      # - 手動選「完整資料回補與回測」 => full_report
      # - 手動選「不使用快取重新抓完整資料」 => full_report
      # - 每日 21:30 排程 => full_report
      # - 其他情況 => daily_signal
      RUN_PLAN: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && 'full_report' || 'daily_signal' }}

      # 基本快取設定
      # FORCE_FULL_CACHE_REFRESH=1：
      # 不讀舊快取，但跑完仍會重建並寫入新快取。
      USE_CACHE: "1"
      FORCE_FULL_CACHE_REFRESH: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '不使用快取重新抓完整資料') && '1' || '0' }}

      # 分批儲存快取，避免程式跑一半失敗後下次又全部重抓。
      HISTORY_BATCH_SAVE_EVERY: "1000"

      OPENAPI_TWSE_FALLBACK_FILE: "t187ap42_L.csv"
      OPENAPI_TPEX_FALLBACK_FILE: "t187ap42_O.csv"

      # 分點模式
      # 每日產圖 = 精選5分點 RUN_MODE=1
      # 完整回補 / 不使用快取完整重抓 = 完整分點清單 RUN_MODE=2
      RUN_MODE: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && '2' || '1' }}

      # OpenAPI 今日有成交權證預篩天數
      # 每日產圖雖然只跑 5 分點，但因為已強制全候選完整追蹤，所以這裡維持較小值即可；
      # 完整回補用最近 3 天提高完整性。
      OPENAPI_ACTIVE_PRESCAN_DAYS: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && '3' || '1' }}

      # 每次都重新抓 OpenAPI + API4，避免錯過今天新權證。
      ACTIVE_WARRANT_FORCE_REFRESH: "1"

      # 關鍵修正：
      # 精選5分點模式也抓完整 API5 歷史，避免 TOP15 因資料不足而少算。
      DAILY_SIGNAL_API5_DAYS: "250"

      # 完整回補模式：新候選抓完整歷史；既有候選補最近 5 筆。
      INITIAL_HISTORY_DAYS: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && '750' || '250' }}
      DAILY_UPDATE_DAYS: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && '5' || '3' }}

      # 歷史快取 append / merge 保護，一定要保留，避免 Google Sheet 舊資料被洗掉。
      HISTORY_CACHE_APPEND_ONLY: "1"
      HISTORY_CACHE_MERGE_GSHEET_BEFORE_SAVE: "1"

      # 每日產圖也要抓圖片需要的價格；完整回補也抓完整價格。
      SKIP_PRICE_FETCH: "0"

      # 每日產圖只補 今日_* 需要的價格；完整回補補完整歷史缺價。
      PRICE_FETCH_SCOPE: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && 'full' || 'today' }}

      # 主程式仍保留完整歷史主表邏輯；每日產圖模式會提前只輸出 今日_*，不重算主表。
      REPORT_FULL_HISTORY: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && '1' || '0' }}
      TODAY_IMAGE_USE_CURRENT_CANDIDATES: "1"
      DATA_UPDATE_ONLY: "0"

      AUTO_PRICE_PREFETCH_WHEN_BROKER_DATA_MISSING: "0"
      PRICE_PREFETCH_STATE_ENABLED: "1"
      PRICE_PREFETCH_SKIP_IF_DONE_TODAY: "1"
      PRICE_PREFETCH_FORCE: "0"
      PRICE_PREFETCH_LOOKBACK_DAYS: "30"
      PRICE_PREFETCH_TARGET_DATE: ""
      PRICE_PREFETCH_ALL_ITEM_PRICES: "0"
      PRICE_PREFETCH_ALL_WARRANT_PRICE_LOOKBACK_DAYS: "90"
      PRICE_PREFETCH_ALL_UNDERLYING_PRICE_LOOKBACK_DAYS: "35"
      PRICE_PREFETCH_ALL_REQUIRE_TARGET_DATE: "1"
      BROKER_10D_FETCH_ALL_TRADED_WARRANT_PRICES: "0"

      BROKER_10D_PRICE_FAST_LOOKBACK_DAYS: "12"
      BROKER_10D_PRICE_LOOKBACK_DAYS: "30"
      BROKER_10D_UNDERLYING_PRICE_LOOKBACK_DAYS: "20"

      # 關鍵修正：
      # 精選5分點模式必須絕對完整，不能只靠 prescan 候選。
      # 啟用後會建立「所有認購權證 × 精選5分點」候選池，
      # 並每次都對這些候選用 API5 更新，確保 TOP15 不少算。
      SELECTED_FORCE_ALL_WARRANTS: "1"
      SELECTED_REFRESH_ALL_WARRANTS: "1"

      # 不抓群組事件每一檔權證價格，只看標的股價格。
      FETCH_GROUP_WARRANT_PRICES: "0"

      # 保留相容舊設定，不作為主要跳過依據。
      FAST_SKIP_RECENT_PRESCAN: "0"
      CACHE_RECENT_SCAN_DAYS: "50"

      # Google Sheet 設定
      GSHEET_ENABLE: "1"
      GSHEET_UPLOAD_RESULTS: "1"
      GSHEET_NAME: "權證分點籌碼"
      GOOGLE_SHEET_NAME: "權證分點籌碼"
      GSHEET_CACHE_ENABLED: "1"
      GSHEET_RESULT_ENABLED: "1"

      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      # 執行緒設定
      MAX_WORKERS: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && '60' || '80' }}
      PRICE_WORKERS: "80"
      PRESCAN_WORKERS: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與回測' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) || (github.event_name == 'schedule' && github.event.schedule == '30 13 * * 1-5')) && '60' || '80' }}
      FIND_BROKER_WORKERS: "40"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore local cache backup
        uses: actions/cache@v4
        with:
          path: warrant_cache
          key: warrant-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            warrant-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run warrant backtest
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          mkdir -p output
          python -u warrant_backtest.py 2>&1 | tee output/warrant_backtest.log

      - name: Upload Excel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warrant-backtest-excel
          path: |
            output/*.xlsx
            output/*.log
          if-no-files-found: ignore
