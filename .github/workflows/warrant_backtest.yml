name: Warrant Backtest Google Sheet

on:
  workflow_dispatch:
  schedule:
    # Asia/Taipei 17:10 = UTC 09:10
    - cron: "10 9 * * 1-5"

    # Asia/Taipei 21:05、21:35 = UTC 13:05、13:35
    - cron: "5,35 13 * * 1-5"

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      OUTPUT_DIR: output
      CACHE_DIR: warrant_cache

      # 快取設定
      USE_CACHE: "1"
      FORCE_FULL_CACHE_REFRESH: "0"

      # 是否跳過價格補抓
      # 1 = 不再補抓 TWSE / TPEx / Yahoo 收盤價，只使用既有「快取_價格」
      #     優點：每日跑精選 5 分點 ABCD 速度會快很多
      #     缺點：D+1～D+20、標的股股價、5MA、20MA 可能不完整或顯示 -
      # 0 = 正常補抓價格，報表較完整，但執行時間會明顯變久
      # 建議：平常每日排程用 1；需要更新完整價格 / D+ 表現時，手動改成 0 跑一次
      SKIP_PRICE_FETCH: "1"

      # 分點模式
      # RUN_MODE=1：精選分點
      # RUN_MODE=2：完整 TARGET_PATTERNS 分點清單
      RUN_MODE: "1"

      # OpenAPI 今日有成交權證 + API4 預篩天數
      OPENAPI_ACTIVE_PRESCAN_DAYS: "1"

      # 關閉精選分點 × 全部權證的暴力候選池
      # 即使 RUN_MODE=2 目前不主要用到，也保留，避免之後切回 RUN_MODE=1 又爆量
      SELECTED_FORCE_ALL_WARRANTS: "0"
      SELECTED_REFRESH_ALL_WARRANTS: "0"

      # 歷史資料設定
      # 第一次新候選抓較長歷史，之後每日只補最近資料
      INITIAL_HISTORY_DAYS: "250"
      DAILY_UPDATE_DAYS: "1"

      # 歷史快取改為 append / merge，不覆蓋舊資料
      HISTORY_CACHE_APPEND_ONLY: "1"
      HISTORY_CACHE_MERGE_GSHEET_BEFORE_SAVE: "1"

      # Google Sheet 設定
      GSHEET_ENABLE: "1"
      GSHEET_UPLOAD_RESULTS: "1"
      GSHEET_NAME: "權證分點籌碼"
      GOOGLE_SHEET_NAME: "權證分點籌碼"
      GSHEET_CACHE_ENABLED: "1"
      GSHEET_RESULT_ENABLED: "1"

      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      # 其他流程設定
      FAST_SKIP_RECENT_PRESCAN: "0"
      CACHE_RECENT_SCAN_DAYS: "3"
      FETCH_GROUP_WARRANT_PRICES: "0"

      # 測試每日最新資料速度時可設 1
      # 平常若想吃同日快取可改 0
      ACTIVE_WARRANT_FORCE_REFRESH: "1"

      # 執行緒設定
      MAX_WORKERS: "60"
      PRICE_WORKERS: "80"
      PRESCAN_WORKERS: "40"
      FIND_BROKER_WORKERS: "40"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore local cache backup
        uses: actions/cache@v4
        with:
          path: warrant_cache
          key: warrant-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            warrant-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run warrant backtest
        run: |
          mkdir -p output
          python warrant_backtest.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: warrant-backtest-excel
          path: output/*.xlsx
