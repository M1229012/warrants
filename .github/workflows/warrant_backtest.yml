name: Stock Branch Backtest Google Sheet(權證)

on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: "執行方案"
        required: true
        default: "精選2分點近一月買賣超"
        type: choice
        options:
          - "精選2分點近一月買賣超"
          - "完整資料回補與統計"
          - "不使用快取重新抓完整資料"

  schedule:
    # 台灣時間 18:05 = UTC 10:05，週一到週五執行
    - cron: "5 10 * * 1-5"

concurrency:
  group: stock-branch-backtest-google-sheet
  cancel-in-progress: false

jobs:
  stock-branch-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OUTPUT_DIR: output
      CACHE_DIR: stock_branch_cache

      RUN_PLAN: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與統計' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) && 'full_report' || 'daily_signal' }}

      # 精選2分點 / 排程：近 31 天；完整回補 / 重新抓：近 90 天
      STOCK_LOOKBACK_DAYS: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與統計' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) && '90' || '31' }}
      LOOKBACK_DAYS: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與統計' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) && '90' || '31' }}

      USE_CACHE: "1"
      FORCE_FULL_CACHE_REFRESH: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '不使用快取重新抓完整資料') && '1' || '0' }}

      # 固定追蹤：9661 富邦-新店、9A9J 永豐金-板新
      STOCK_LIMIT: "0"
      INCLUDE_ETF: "0"
      REFRESH_STOCK_LIST: "1"

      CAPTURE_ALL_TOP15: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與統計' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) && '1' || '0' }}

      # Google Sheet：直接寫入「股票現貨籌碼」，不讀 GOOGLE_SHEET_ID / GOOGLE_SHEET_NAME secret
      GSHEET_CACHE_ENABLED: "1"
      GSHEET_RESULT_ENABLED: "1"
      GOOGLE_SHEET_NAME: "股票現貨籌碼"
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      MAX_WORKERS: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與統計' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) && '30' || '18' }}
      STOCK_BRANCH_WORKERS: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.run_plan == '完整資料回補與統計' || github.event.inputs.run_plan == '不使用快取重新抓完整資料')) && '30' || '18' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore local cache backup
        uses: actions/cache@v4
        with:
          path: stock_branch_cache
          key: stock-branch-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            stock-branch-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl gspread google-auth lxml html5lib

      - name: Run stock branch backtest
        run: |
          mkdir -p output
          python stock_branch_backtest.py

      - name: Upload Excel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-branch-output
          path: output/*.xlsx
          if-no-files-found: ignore
