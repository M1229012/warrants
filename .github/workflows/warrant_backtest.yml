name: Warrant Backtest Google Sheet

on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: "執行方案"
        required: true
        default: "精選5分點當日買賣超產圖"
        type: choice
        options:
          - "精選5分點當日買賣超產圖"
          - "完整資料回補與回測"

  schedule:
    # Asia/Taipei 17:10 = UTC 09:10
    - cron: "10 9 * * 1-5"

    # Asia/Taipei 21:05、21:35 = UTC 13:05、13:35
    - cron: "5,35 13 * * 1-5"

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      OUTPUT_DIR: output
      CACHE_DIR: warrant_cache

      # 只保留兩種方案：
      # 1. 精選5分點當日買賣超產圖：每日盤後快速模式，只抓最新資料、產生 今日_A/B/C/D 給圖片使用。
      # 2. 完整資料回補與回測：其他時間手動完整補歷史、重算 A/B/C/D、勝率、排行與完整價格。
      RUN_PLAN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && 'full_report' || 'daily_signal' }}

      # 基本快取設定
      USE_CACHE: "1"
      FORCE_FULL_CACHE_REFRESH: "0"

      # 分點模式
      # 每日產圖 = 精選5分點 RUN_MODE=1
      # 完整回補 = 完整分點清單 RUN_MODE=2
      RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && '2' || '1' }}

      # OpenAPI 今日有成交權證預篩天數
      # 每日產圖只看最新交易日；完整回補用最近 3 天提高完整性。
      OPENAPI_ACTIVE_PRESCAN_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && '3' || '1' }}

      # 每次都重新抓 OpenAPI + API4，避免錯過今天新權證。
      ACTIVE_WARRANT_FORCE_REFRESH: "1"

      # 每日產圖模式：每組候選只抓最近 12 筆 API5，足夠判斷 A/B/C/D 今日訊號。
      DAILY_SIGNAL_API5_DAYS: "12"

      # 完整回補模式：新候選抓完整歷史；既有候選補最近 5 筆。
      INITIAL_HISTORY_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && '750' || '250' }}
      DAILY_UPDATE_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && '5' || '3' }}

      # 歷史快取 append / merge 保護，一定要保留，避免 Google Sheet 舊資料被洗掉。
      HISTORY_CACHE_APPEND_ONLY: "1"
      HISTORY_CACHE_MERGE_GSHEET_BEFORE_SAVE: "1"

      # 每日產圖也要抓圖片需要的價格；完整回補也抓完整價格。
      SKIP_PRICE_FETCH: "0"

      # 每日產圖只補 今日_* 需要的價格；完整回補補完整歷史缺價。
      PRICE_FETCH_SCOPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && 'full' || 'today' }}

      # 主程式仍保留完整歷史主表邏輯；每日產圖模式會提前只輸出 今日_*，不重算主表。
      REPORT_FULL_HISTORY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && '1' || '0' }}
      TODAY_IMAGE_USE_CURRENT_CANDIDATES: "1"
      DATA_UPDATE_ONLY: "0"

      # 已停用的舊版暴力候選池
      SELECTED_FORCE_ALL_WARRANTS: "0"
      SELECTED_REFRESH_ALL_WARRANTS: "0"

      # 不抓群組事件每一檔權證價格，只看標的股價格。
      FETCH_GROUP_WARRANT_PRICES: "0"

      # 保留相容舊設定，不作為主要跳過依據。
      FAST_SKIP_RECENT_PRESCAN: "0"
      CACHE_RECENT_SCAN_DAYS: "3"

      # Google Sheet 設定
      GSHEET_ENABLE: "1"
      GSHEET_UPLOAD_RESULTS: "1"
      GSHEET_NAME: "權證分點籌碼"
      GOOGLE_SHEET_NAME: "權證分點籌碼"
      GSHEET_CACHE_ENABLED: "1"
      GSHEET_RESULT_ENABLED: "1"

      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      # 執行緒設定
      MAX_WORKERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && '60' || '80' }}
      PRICE_WORKERS: "60"
      PRESCAN_WORKERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_plan == '完整資料回補與回測' && '60' || '80' }}
      FIND_BROKER_WORKERS: "40"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore local cache backup
        uses: actions/cache@v4
        with:
          path: warrant_cache
          key: warrant-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            warrant-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run warrant backtest
        run: |
          mkdir -p output
          python warrant_backtest.py

      - name: Upload Excel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warrant-backtest-excel
          path: output/*.xlsx
          if-no-files-found: ignore
