name: FinMind Warrant Branch Update Probe

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "手動指定交易日期，例如 2026-07-15；留空則自動判斷"
        required: false
        default: ""
        type: string

      force_probe:
        description: "即使當日已判定完整，仍強制再查一次"
        required: true
        default: false
        type: boolean

  schedule:
    # 台北時間平日 17:00～23:50，每 10 分鐘一次。
    - cron: "*/10 17-23 * * 1-5"
      timezone: "Asia/Taipei"

    # 台北時間週二～週六 00:00～16:50，每 10 分鐘一次。
    # 這一段會接續偵測前一個交易日；一旦判定完整，程式會直接略過 API。
    - cron: "*/10 0-16 * * 2-6"
      timezone: "Asia/Taipei"

permissions:
  contents: write

concurrency:
  group: finmind-warrant-branch-update-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Probe FinMind warrant branch data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

          # 以下兩個 Repository Variables 都是選填：
          # 1. FINMIND_BROKER_IDS：逗號分隔的券商分點代碼，設定後優先使用。
          # 2. FINMIND_BROKER_NAMES：逗號分隔的分點名稱。
          # 若兩者都沒設定，Python 會使用內建的 38 個追蹤分點名稱並自動找代碼。
          FINMIND_BROKER_IDS: ${{ vars.FINMIND_BROKER_IDS }}
          FINMIND_BROKER_NAMES: ${{ vars.FINMIND_BROKER_NAMES }}

          # 連續 4 次相同代表：首次資料加上後續 3 次、約 30 分鐘沒有變動。
          STABLE_PROBES_REQUIRED: "4"
          REQUEST_INTERVAL_SECONDS: "0.30"
          REQUEST_TIMEOUT_SECONDS: "60"
          MAX_RETRIES: "3"

          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
          FORCE_PROBE: ${{ github.event.inputs.force_probe || 'false' }}
        run: |
          python finmind_warrant_probe.py

      - name: Commit probe logs and completed data
        if: always()
        shell: bash
        run: |
          if [ ! -d "data/finmind_probe" ]; then
            echo "No probe output directory; nothing to commit."
            exit 0
          fi

          if [ -z "$(git status --porcelain -- data/finmind_probe)" ]; then
            echo "No probe changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/finmind_probe
          git commit -m "chore: update FinMind warrant probe logs [skip ci]"

          # concurrency 已避免同一工作流重疊；pull --rebase 再降低其他提交造成的衝突。
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
