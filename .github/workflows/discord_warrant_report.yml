name: Discord Warrant Branch Report From Google Sheet

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "指定圖卡日期，例如 2026-05-18。留空則自動抓 Google Sheet 內最新日期"
        required: false
        default: ""
      run_plan:
        description: "執行方案"
        required: true
        default: "精選五分點每日圖"
        type: choice
        options:
          - "精選五分點每日圖"
          - "近一個月共識淨買超TOP15"
          - "本週權證共識買賣超TOP15"
          - "近10日分點買賣明細圖"
          - "全部圖片"

  schedule:
    # 台灣時間 14:30 = UTC 06:30
    - cron: "30 06 * * 1-5"

jobs:
  send-discord-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GOOGLE_SHEET_NAME: "權證分點籌碼"
      # 建議你用 GOOGLE_SHEET_ID，比名稱更穩；若不用可刪掉這行或留空。
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}
      DISCORD_WEBHOOK_URL_TEST: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

      BUY_THRESHOLD: "1000000"
      SELL_THRESHOLD_RATIO: "0.2"
      DISPLAY_EXIT_ALWAYS: "0"

      OUTPUT_IMAGE: output/精選分點買賣超追蹤.png

      # 排程預設執行原本的每日圖流程
      RUN_PLAN: "精選五分點每日圖"

      # 正式執行關閉除錯；若之後要確認近10日圖實際採用 run_id，可暫時改成 "1"
      DEBUG_BROKER_10D_DETAIL: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pillow gspread google-auth matplotlib

      - name: Generate image from Google Sheet and send to Discord
        run: |
          ACTION_VALUE="${RUN_PLAN}"

          if [ -n "${{ github.event.inputs.run_plan }}" ]; then
            ACTION_VALUE="${{ github.event.inputs.run_plan }}"
          fi

          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python "discord_warrant_report_gsheet.py" \
              --date "${{ github.event.inputs.target_date }}" \
              --action "${ACTION_VALUE}"
          else
            python "discord_warrant_report_gsheet.py" \
              --action "${ACTION_VALUE}"
          fi

      - name: Upload generated image artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discord-warrant-report-image
          path: output/*.png
          if-no-files-found: ignore
