name: Discord Warrant Branch Report From Google Sheet

on:
  workflow_dispatch:
    inputs:
      data_source:
        description: "選擇要使用的 Google Sheet 資料"
        required: true
        default: "新版資料（A～E 金額分級）"
        type: choice
        options:
          - "新版資料（A～E 金額分級）"
          - "舊版資料（A～D 舊分類）"

      target_date:
        description: "指定圖卡日期，例如 2026-05-18。留空則自動抓 Google Sheet 內最新日期"
        required: false
        default: ""

      run_plan:
        description: "執行方案"
        required: true
        default: "精選五分點每日圖"
        type: choice
        options:
          - "精選五分點每日圖"
          - "近一個月共識淨買超TOP15"
          - "本週權證共識買賣超TOP15"
          - "近10日分點買賣明細圖"
          - "所有分點勝率統計圖"
          - "全部圖片"

      broker_name:
        description: "指定分點名稱，例如 元大南屯。只有執行近10日分點買賣明細圖時使用"
        required: false
        default: ""

      notification_mode:
        description: "選擇 Discord 推播模式"
        required: true
        default: "測試推播"
        type: choice
        options:
          - "測試推播"
          - "正式推播"

  schedule:
    # 台灣時間 16:20 = UTC 08:20
    # 排程無法選下拉選項，因此固定使用新版資料。
    - cron: "20 08 * * 1-5"

jobs:
  send-discord-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}

      # 建議將新舊兩份 Google Sheet 分別建立 Secret。
      GOOGLE_SHEET_ID_OLD_SECRET: ${{ secrets.GOOGLE_SHEET_ID_OLD }}
      GOOGLE_SHEET_ID_NEW_SECRET: ${{ secrets.GOOGLE_SHEET_ID_MONEYDJ }}

      # 舊有 GOOGLE_SHEET_ID 保留作為備援，避免尚未新增 Secret 時直接失敗。
      GOOGLE_SHEET_ID_FALLBACK: ${{ secrets.GOOGLE_SHEET_ID }}

      DISCORD_WEBHOOK_URL_FORMAL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL_TEST_SECRET: ${{ secrets.DISCORD_WEBHOOK_URL_TEST }}

      BUY_THRESHOLD: "1000000"
      SELL_THRESHOLD_RATIO: "0.5"
      DISPLAY_EXIT_ALWAYS: "0"
      OUTPUT_IMAGE: output/精選分點買賣超追蹤.png

      # 排程預設執行每日圖；手動執行時會由 run_plan 覆蓋。
      RUN_PLAN: "精選五分點每日圖"
      DEBUG_BROKER_10D_DETAIL: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system fonts
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          install_fonts() {
            sudo timeout 120s apt-get update -qq
            sudo timeout 120s apt-get install -y --no-install-recommends fonts-noto-cjk
            fc-cache -f
          }

          if fc-list | grep -qi "Noto Sans CJK"; then
            echo "✅ Noto Sans CJK 已存在，略過安裝"
          else
            echo "開始安裝 Noto Sans CJK 字型"

            if ! install_fonts; then
              echo "⚠️ 第一次安裝字型失敗或逾時，等待 10 秒後重試"
              sleep 10
              install_fonts
            fi

            echo "✅ Noto Sans CJK 字型安裝完成"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pillow gspread google-auth matplotlib

      - name: Resolve selected data source
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATA_SOURCE="${{ github.event.inputs.data_source }}"
            NOTIFICATION_MODE="${{ github.event.inputs.notification_mode }}"
          else
            DATA_SOURCE="新版資料（A～E 金額分級）"
            NOTIFICATION_MODE="測試推播"
          fi

          case "${DATA_SOURCE}" in
            "舊版資料（A～D 舊分類）")
              DATA_VERSION="old"
              SHEET_NAME="權證分點籌碼"
              SHEET_ID="${GOOGLE_SHEET_ID_OLD_SECRET:-${GOOGLE_SHEET_ID_FALLBACK:-}}"
              ;;

            "新版資料（A～E 金額分級）")
              DATA_VERSION="new"
              SHEET_NAME="權證分點資料_NEW_MoneyDJ"
              SHEET_ID="${GOOGLE_SHEET_ID_NEW_SECRET:-${GOOGLE_SHEET_ID_FALLBACK:-}}"
              ;;

            *)
              echo "不支援的資料來源選項：${DATA_SOURCE}"
              exit 1
              ;;
          esac

          if [ -z "${SHEET_ID}" ]; then
            echo "找不到 Google Sheet ID。"
            echo "舊版請設定 GOOGLE_SHEET_ID_OLD。"
            echo "新版請設定 GOOGLE_SHEET_ID_MONEYDJ。"
            echo "也可以暫時使用 GOOGLE_SHEET_ID 作為備援。"
            exit 1
          fi

          if [ "${NOTIFICATION_MODE}" = "正式推播" ]; then
            WEBHOOK_URL="${DISCORD_WEBHOOK_URL_FORMAL:-}"
          else
            WEBHOOK_URL="${DISCORD_WEBHOOK_URL_TEST_SECRET:-}"
          fi

          if [ -z "${WEBHOOK_URL}" ]; then
            echo "找不到 ${NOTIFICATION_MODE} 對應的 Discord Webhook。"
            exit 1
          fi

          {
            echo "GSHEET_DATA_VERSION=${DATA_VERSION}"
            echo "GOOGLE_SHEET_NAME=${SHEET_NAME}"
            echo "GOOGLE_SHEET_ID=${SHEET_ID}"
            echo "DISCORD_WEBHOOK_URL_TEST=${WEBHOOK_URL}"
          } >> "${GITHUB_ENV}"

          echo "選擇資料來源：${DATA_SOURCE}"
          echo "程式資料版本：${DATA_VERSION}"
          echo "Google Sheet 名稱：${SHEET_NAME}"
          echo "Discord 推播模式：${NOTIFICATION_MODE}"

      - name: Generate image from selected Google Sheet and send to Discord
        shell: bash
        run: |
          set -euo pipefail

          ACTION_VALUE="${RUN_PLAN}"
          TARGET_DATE_VALUE=""
          BROKER_NAME_VALUE=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION_VALUE="${{ github.event.inputs.run_plan }}"
            TARGET_DATE_VALUE="${{ github.event.inputs.target_date }}"
            BROKER_NAME_VALUE="${{ github.event.inputs.broker_name }}"
          fi

          CMD=(python "discord_warrant_report_gsheet.py" --action "${ACTION_VALUE}")

          if [ -n "${TARGET_DATE_VALUE}" ]; then
            CMD+=(--date "${TARGET_DATE_VALUE}")
          fi

          if [ -n "${BROKER_NAME_VALUE}" ]; then
            CMD+=(--broker "${BROKER_NAME_VALUE}")
          fi

          printf '執行指令：'
          printf ' %q' "${CMD[@]}"
          printf '\n'

          "${CMD[@]}"

      - name: Upload generated image artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discord-warrant-report-image
          path: output/*.png
          if-no-files-found: ignore
